  <div id="adminAuthModal" class="auth-modal is-hidden" aria-hidden="true">
    <button type="button" class="auth-backdrop" data-auth-close aria-label="관리자 로그인 닫기"></button>
    <section class="auth-dialog" role="dialog" aria-modal="true" aria-labelledby="adminAuthTitle">
      <p class="auth-eyebrow">관리자 인증</p>
      <h3 id="adminAuthTitle">관리자 로그인</h3>
      <form id="adminAuthForm" class="auth-form" autocomplete="off">
        <label>
          <span>비밀번호</span>
          <input id="adminAuthInput" name="password" type="password" required />
        </label>
        <p id="adminAuthStatus" class="status">관리자 비밀번호를 입력하세요.</p>
        <div class="form-row">
          <button type="submit">로그인</button>
          <button id="adminAuthCancel" type="button" class="auth-cancel">취소</button>
        </div>
      </form>
    </section>
  </div>
