<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AID 요구사항 체크리스트</title>
  <style>
    :root {
      --bg: #f5f2ec;
      --card: #ffffff;
      --line: #ddd4c7;
      --ink: #1f1a14;
      --muted: #6d6256;
      --accent: #2d261d;
      --done: #8f8a82;
      --strike: #d65252;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 0% 0%, #faf8f4, var(--bg) 64%);
      line-height: 1.5;
    }

    .wrap {
      width: min(1024px, calc(100vw - 32px));
      margin: 28px auto 56px;
      display: grid;
      gap: 16px;
    }

    .head {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f9f7f2;
      font-size: 13px;
      padding: 7px 12px;
    }

    button {
      border: 1px solid var(--accent);
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 13px;
      padding: 8px 13px;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: -0.01em;
    }

    .items {
      display: grid;
      gap: 8px;
    }

    .item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 9px;
      align-items: start;
      border: 1px solid #eee7dd;
      border-radius: 10px;
      background: #fcfbf8;
      padding: 9px 10px;
    }

    .item input {
      margin-top: 2px;
      width: 17px;
      height: 17px;
      accent-color: #2f271e;
      cursor: pointer;
    }

    .text {
      font-size: 14px;
      color: #2b241d;
      transition: color 140ms ease;
    }

    .item input:checked + .text {
      color: var(--done);
      text-decoration-line: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: var(--strike);
      text-decoration-skip-ink: none;
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 760px) {
      .wrap { width: calc(100vw - 18px); margin-top: 14px; }
      .section, .head { border-radius: 12px; padding: 12px; }
      .item { grid-template-columns: 20px 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="head">
      <h1>AID 부동산 홈페이지 제작 기획안 체크리스트</h1>
      <p class="meta">원본: <code>requirements/AID 부동산 홈페이지 제작 기획안.pdf</code></p>
      <div class="toolbar">
        <span class="pill" id="progress">0 / 0 완료</span>
        <button type="button" id="checkAll">전체 체크</button>
        <button type="button" id="uncheckAll" class="secondary">전체 해제</button>
      </div>
      <p class="note">체크 상태는 브라우저에 자동 저장됩니다(localStorage).</p>
    </section>

    <section class="section">
      <h2>1) 기획 방향성/진행 방식</h2>
      <div class="items">
        <label class="item"><input type="checkbox" data-id="p1-1" /><span class="text">일반 매물 사이트가 아니라 공간 브랜딩/사옥 기획/인플루언서 자산관리 회사 포지셔닝을 명확히 반영한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p1-2" /><span class="text">와이어프레임을 먼저 공유하고, 이후 디자인/디테일 조율 프로세스를 따른다.</span></label>
        <label class="item"><input type="checkbox" data-id="p1-3" /><span class="text">구현 난이도 높은 기능은 초기 설계 단계에서 선 논의 후 방향을 확정한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p1-4" /><span class="text">레이아웃 구조는 cmlandco 참고, 콘텐츠 전달 톤은 ohoi 스타일을 참고한다.</span></label>
      </div>
    </section>

    <section class="section">
      <h2>2) 프로젝트 목표</h2>
      <div class="items">
        <label class="item"><input type="checkbox" data-id="p2-1" /><span class="text">첫 화면에서 감도 있는 회사라는 인상을 만든다.</span></label>
        <label class="item"><input type="checkbox" data-id="p2-2" /><span class="text">디벨롭(사옥 기획/개발) 전문 회사 이미지를 형성한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p2-3" /><span class="text">단순 매물 나열이 아닌 브랜드 신뢰 구축 중심으로 구성한다.</span></label>
      </div>
    </section>

    <section class="section">
      <h2>3) 레이아웃 방향</h2>
      <div class="items">
        <label class="item"><input type="checkbox" data-id="p3-1" /><span class="text">섹션을 크게 사용한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p3-2" /><span class="text">여백 중심 레이아웃을 유지한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p3-3" /><span class="text">한 섹션당 하나의 메시지만 전달한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p3-4" /><span class="text">이미지 중심 구성으로, shop형 항목에는 디벨롭 건물 이미지를 사용한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p3-5" /><span class="text">정보 과다를 지양한다.</span></label>
      </div>
    </section>

    <section class="section">
      <h2>4) 콘텐츠 구성 방식</h2>
      <div class="items">
        <label class="item"><input type="checkbox" data-id="p4-1" /><span class="text">긴 설명 대신 짧고 단단한 문장 구조를 사용한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p4-2" /><span class="text">강한 한 줄 메시지를 중심으로 배치한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p4-3" /><span class="text">회사 소개에 인스타그램/유튜브 연결을 포함한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p4-4" /><span class="text">프로젝트 섹션을 핵심 콘텐츠 축으로 유지한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p4-5" /><span class="text">문의 전환 동선을 명확히 만든다.</span></label>
      </div>
    </section>

    <section class="section">
      <h2>5) 페이지 구조 제안 반영</h2>
      <div class="items">
        <label class="item"><input type="checkbox" data-id="p5-1" /><span class="text">PROJECTS: 풀스크린 비주얼 + 슬로건 구성으로 시작한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p5-2" /><span class="text">COMPANY: “Where visibility becomes value.” 메시지를 노출한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p5-3" /><span class="text">COMPANY: 대표 자필 사인, 우리가 하는 일, 주소/번호/상호명/사업자등록번호를 포함한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p5-4" /><span class="text">SEARCH: 사무실/상업/주거/건물 분류를 제공한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p5-5" /><span class="text">SEARCH 필터: 지역/업종/면적/보증금/월세/권리금/층/주차를 제공한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p5-6" /><span class="text">SEARCH 결과: 리스트와 지도(선택)를 제공한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p5-7" /><span class="text">상세페이지: 사진/핵심요약/위치(지도)/문의 CTA(전화·폼)를 제공한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p5-8" /><span class="text">OUR PARTNERS 섹션은 미정 상태로 영역만 확보한다.</span></label>
      </div>
    </section>

    <section class="section">
      <h2>6) 기능 요구사항</h2>
      <div class="items">
        <label class="item"><input type="checkbox" data-id="p6-1" /><span class="text">관리자에서 매물 등록/수정이 가능해야 한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p6-2" /><span class="text">문의폼 수집 및 알림 연동이 되어야 한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p6-3" /><span class="text">모바일 최적화를 필수로 적용한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p6-4" /><span class="text">기본 SEO 세팅(메타 정보)을 적용한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p6-5" /><span class="text">과도한 애니메이션은 지양하고 부드러운 트랜지션만 사용한다.</span></label>
      </div>
    </section>

    <section class="section">
      <h2>7) 지양하는 방향</h2>
      <div class="items">
        <label class="item"><input type="checkbox" data-id="p7-1" /><span class="text">네이버 부동산형 리스트 중심 구조를 피한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p7-2" /><span class="text">배너 다수 사용을 피한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p7-3" /><span class="text">전형적인 동네 중개업소 인상을 피한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p7-4" /><span class="text">색상 과다 사용을 피한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p7-5" /><span class="text">기능 위주의 딱딱한 UI를 피한다.</span></label>
      </div>
    </section>

    <section class="section">
      <h2>8) 무드/톤</h2>
      <div class="items">
        <label class="item"><input type="checkbox" data-id="p8-1" /><span class="text">미니멀/뉴트럴 톤(베이지·아이보리 기반)을 유지한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p8-2" /><span class="text">이미지 중심으로 구성한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p8-3" /><span class="text">타이포그래피 강조 스타일을 유지한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p8-4" /><span class="text">충분한 여백을 활용한다.</span></label>
        <label class="item"><input type="checkbox" data-id="p8-5" /><span class="text">과도한 기능/효과를 지양한다.</span></label>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "aid_requirements_checklist_v1";
    const checkboxes = Array.from(document.querySelectorAll('input[type="checkbox"][data-id]'));
    const progress = document.getElementById("progress");
    const checkAllBtn = document.getElementById("checkAll");
    const uncheckAllBtn = document.getElementById("uncheckAll");

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function renderProgress() {
      const total = checkboxes.length;
      const done = checkboxes.filter((cb) => cb.checked).length;
      progress.textContent = `${done} / ${total} 완료`;
    }

    function applySavedState() {
      const state = loadState();
      checkboxes.forEach((cb) => {
        cb.checked = Boolean(state[cb.dataset.id]);
      });
      renderProgress();
    }

    function updateSingle(cb) {
      const state = loadState();
      state[cb.dataset.id] = cb.checked;
      saveState(state);
      renderProgress();
    }

    checkboxes.forEach((cb) => {
      cb.addEventListener("change", () => updateSingle(cb));
    });

    checkAllBtn.addEventListener("click", () => {
      const state = loadState();
      checkboxes.forEach((cb) => {
        cb.checked = true;
        state[cb.dataset.id] = true;
      });
      saveState(state);
      renderProgress();
    });

    uncheckAllBtn.addEventListener("click", () => {
      const state = loadState();
      checkboxes.forEach((cb) => {
        cb.checked = false;
        state[cb.dataset.id] = false;
      });
      saveState(state);
      renderProgress();
    });

    applySavedState();
  </script>
</body>
</html>
